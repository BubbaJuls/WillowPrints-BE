# WillowPrints backend - dev stack (PostgreSQL + WP-BE)
# Usage: wsl -e bash -c "cd /mnt/c/Users/jv-innerworks/WillowPrints/WP-BE && docker compose up -d"
# Then: npm run start:dev (or run API inside container if you add a dev service)

services:
  db:
    image: postgres:16-alpine
    container_name: willowprints-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: willowprints
      POSTGRES_PASSWORD: willowprints_dev
      POSTGRES_DB: willowprints
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U willowprints -d willowprints"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: run WP-BE in dev mode inside Docker (uncomment to use)
  # api:
  #   build: .
  #   container_name: willowprints-api
  #   restart: unless-stopped
  #   env_file: .env
  #   environment:
  #     DATABASE_URL: postgresql://willowprints:willowprints_dev@db:5432/willowprints
  #   ports:
  #     - "4000:4000"
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  pgdata:
